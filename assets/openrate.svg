<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="openrate">
  <defs>
    <linearGradient id="og" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="96" height="96" rx="22" fill="#0c1018"/>
  <rect x="2.5" y="2.5" width="95" height="95" rx="21.5" fill="none" stroke="url(#og)" stroke-opacity="0.45"/>
  <!-- mesh ring: currencies as nodes, chords as the no-single-base graph -->
  <g stroke="url(#og)" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.85">
    <polygon points="83,50 66.5,21.4 33.5,21.4 17,50 33.5,78.6 66.5,78.6" stroke-opacity="0.55"/>
    <line x1="50" y1="50" x2="83" y2="50"/>
    <line x1="50" y1="50" x2="66.5" y2="21.4"/>
    <line x1="50" y1="50" x2="33.5" y2="21.4"/>
    <line x1="50" y1="50" x2="17" y2="50"/>
    <line x1="50" y1="50" x2="33.5" y2="78.6"/>
    <line x1="50" y1="50" x2="66.5" y2="78.6"/>
  </g>
  <g fill="#0c1018" stroke="url(#og)" stroke-width="2.2">
    <circle cx="83" cy="50" r="5.5"/>
    <circle cx="66.5" cy="21.4" r="5.5"/>
    <circle cx="33.5" cy="21.4" r="5.5"/>
    <circle cx="17" cy="50" r="5.5"/>
    <circle cx="33.5" cy="78.6" r="5.5"/>
    <circle cx="66.5" cy="78.6" r="5.5"/>
  </g>
  <!-- ZAR anchor: the chosen presentation base, highlighted at the center -->
  <circle cx="50" cy="50" r="10" fill="url(#og)"/>
  <text x="50" y="54.4" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif"
        font-size="9.5" font-weight="700" fill="#0c1018">R</text>
</svg>
